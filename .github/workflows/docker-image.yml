name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy redeploy
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          DOKPLOY_DEPLOY_HOOK: ${{ secrets.DOKPLOY_DEPLOY_HOOK }}
        run: |
          test -n "$DOKPLOY_DEPLOY_HOOK" || { printf 'Missing DOKPLOY_DEPLOY_HOOK secret\n' >&2; exit 1; }

          payload=$(printf '{"ref":"%s","head_commit":{"id":"%s","message":"Deploy %s from %s"},"commits":[{"modified":["."]}]}' \
            "$GITHUB_REF" "$GITHUB_SHA" "$GITHUB_SHA" "$GITHUB_REPOSITORY")

          response=$(curl --show-error --silent \
            --request POST \
            --header "X-GitHub-Event: push" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            --write-out '\n%{http_code}' \
            "$DOKPLOY_DEPLOY_HOOK")

          http_status="${response##*$'\n'}"
          response_body="${response%$'\n'*}"

          printf 'Dokploy response: %s\n' "$response_body"

          if [ "$http_status" -ge 400 ]; then
            printf 'Dokploy redeploy failed with HTTP %s\n' "$http_status" >&2
            exit 1
          fi
